name: Self-Perf
description: Profile performance, optimize hot paths deterministically, verify improvement

steps:
  - id: baseline
    command: "{{input}} 2>&1 || true"

  - id: optimize
    model: smart
    prompt: |
      Performance baseline:

      {{baseline}}

      Identify the bottleneck and make a targeted optimization.
      Only change what impacts the metric — no speculative refactoring.
      ONE optimization at a time.

      After making changes, say DONE.
    loop:
      max: 5
      until: DONE
      gate: "{{input}}"

  - id: verify
    command: "{{input}} 2>&1 || true"

  - id: summary
    model: fast
    prompt: |
      Performance optimization complete.

      Before:
      {{baseline}}

      After:
      {{verify}}

      Report the improvement (absolute and percentage).
