name: Self-Lint
description: Run linter, fix violations deterministically, repeat until clean

steps:
  - id: baseline
    command: '$DEVKIT_INPUT 2>&1 || true'

  - id: fix
    model: smart
    prompt: |
      Current lint output:

      {{baseline}}

      Fix lint/type violations. Prioritize errors over warnings.
      Fix ONE group of related issues at a time.
      Don't change code behavior — only fix lint issues.
      Don't disable lint rules — fix the underlying issue.

      After fixing, say DONE.
    loop:
      max: 20
      until: DONE
      gate: '$DEVKIT_INPUT'

  - id: verify
    command: '$DEVKIT_INPUT 2>&1 || true'

  - id: summary
    model: fast
    prompt: |
      Lint fix session complete.

      Starting violations:
      {{baseline}}

      Final state:
      {{verify}}

      Summarize what was fixed and what remains (if anything).
