name: Self-Test
description: Run tests, fix failures deterministically, repeat until all pass

steps:
  # $DEVKIT_INPUT is the shell command provided by the caller (e.g.
  # "npm test"). The outer sh expands it, running it as-is. Inherently
  # trusts whatever the caller passes — document in the workflow README.
  - id: baseline
    command: '$DEVKIT_INPUT 2>&1 || true'

  - id: fix
    model: smart
    prompt: |
      Test output:

      {{baseline}}

      Fix the failing tests. The bug might be in the test or the code under test.
      Make targeted changes — don't refactor unrelated code.
      ONE group of related fixes at a time.

      After fixing, say DONE.
    loop:
      max: 8
      until: DONE
      gate: '$DEVKIT_INPUT'

  - id: verify
    command: '$DEVKIT_INPUT 2>&1 || true'

  - id: summary
    model: fast
    prompt: |
      Test fix session complete.

      Starting state:
      {{baseline}}

      Final state:
      {{verify}}

      Summarize what was fixed and how many iterations it took.
