name: Tri-Dispatch
description: Same task sent to three model tiers in parallel — compare their approaches

steps:
  - id: smart-take
    model: smart
    prompt: |
      DISPATCH, DO NOT ANSWER. Tri-dispatch requires three DIFFERENT
      models answer independently. Invoke the Agent tool with a
      non-Claude smart-tier subagent (`codex:codex-rescue` or equivalent
      external). In non-Claude hosts, use a delegated subagent or external CLI
      respondent if available. Report verbatim. Stop if no external subagent is
      available — do NOT answer as yourself. Subagent prompt: "{{input}}
      Give your best, most thorough answer."

  - id: general-take
    model: general
    prompt: |
      DISPATCH, DO NOT ANSWER. Invoke the Agent tool with a non-Claude
      general-tier subagent (prefer `agy:agy-review` (Google AGY); fall
      back to a Gemini-backed subagent, or `codex:codex-rescue` if neither
      is available — at minimum distinct from smart-take's subagent).
      In non-Claude hosts, use a distinct delegated
      subagent or external CLI respondent when available. Report verbatim. Stop if none available.
      Subagent prompt: "{{input}} Give a clear, balanced answer."

  - id: fast-take
    model: fast
    prompt: |
      DISPATCH, DO NOT ANSWER. Invoke the Agent tool with a
      fast-tier external subagent (distinct from the other two). In non-Claude
      hosts, use a distinct delegated subagent or external CLI respondent when
      available. Report verbatim.
      Stop if none available. Subagent prompt: "{{input}} Give a quick,
      direct answer."

  - id: dispatch-all
    parallel: [smart-take, general-take, fast-take]

  - id: compare
    model: smart
    prompt: |
      Three models answered the same question. Compare their responses.

      Smart model:
      {{smart-take}}

      General model:
      {{general-take}}

      Fast model:
      {{fast-take}}

      Produce a comparison:
      ## Where they agree
      ## Where they differ
      ## Best answer (and why)
