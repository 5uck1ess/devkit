name: Self-Improve
description: Metric-gated improvement loop — run command, fix issues, repeat until passing

steps:
  - id: baseline
    command: "{{input}} 2>&1 || true"

  - id: improve
    model: smart
    prompt: |
      Current metric output:

      {{baseline}}

      Analyze the failures and make targeted fixes. Only change what's needed
      to improve the metric. Don't refactor unrelated code.
      ONE group of related fixes at a time.

      After making changes, say DONE.
    loop:
      max: 10
      until: "exit code: 0"
      gate: "{{input}}"

  - id: verify
    command: "{{input}} 2>&1 || true"

  - id: summary
    model: fast
    prompt: |
      Improvement session complete.

      Starting state:
      {{baseline}}

      Final state:
      {{verify}}

      Report what was fixed, how many iterations it took, and current metric status.
