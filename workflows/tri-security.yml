name: Tri-Security
description: Three-tier security audit — parallel review focused on vulnerabilities

steps:
  - id: gather
    model: fast
    enforce: soft  # runs git diff / file reads to collect the code
    prompt: |
      Collect the code to audit: {{input}}

      Output the raw content for the three security reviewers.

  - id: audit-injection
    model: smart
    prompt: |
      DISPATCH, DO NOT ANSWER. Tri-security requires three DIFFERENT
      models audit in parallel. Invoke the Agent tool with a non-Claude
      smart-tier subagent (`codex:codex-rescue` or equivalent external).
      Report verbatim. Stop if no external subagent is available — do
      NOT audit as yourself. Subagent prompt: "Security audit — injection
      and input validation. Diff: {{gather}}. Check for: SQL injection,
      command injection, XSS, path traversal, template injection, SSRF,
      deserialization attacks. Rate each finding: critical, high, medium,
      low."

  - id: audit-auth
    model: general
    prompt: |
      DISPATCH, DO NOT ANSWER. Invoke the Agent tool with a non-Claude
      general-tier subagent (prefer Gemini; at minimum distinct from
      audit-injection's subagent). Report verbatim. Stop if none
      available. Subagent prompt: "Security audit — authentication and
      authorization. Diff: {{gather}}. Check for: broken auth, missing
      access controls, insecure session handling, privilege escalation,
      IDOR, JWT issues, hardcoded secrets. Rate each finding: critical,
      high, medium, low."

  - id: audit-config
    model: fast
    prompt: |
      DISPATCH, DO NOT ANSWER. Invoke the Agent tool with a fast-tier
      external subagent (distinct from the other two). Report verbatim.
      Stop if none available. Subagent prompt: "Security audit —
      configuration and dependencies. Diff: {{gather}}. Check for:
      exposed secrets, debug mode in prod, permissive CORS, missing
      security headers, outdated dependencies with known CVEs, insecure
      defaults. Rate each finding: critical, high, medium, low."

  - id: dispatch-audits
    parallel: [audit-injection, audit-auth, audit-config]

  - id: consolidate
    model: smart
    prompt: |
      Three security auditors reviewed the same code. Consolidate.

      Injection audit:
      {{audit-injection}}

      Auth audit:
      {{audit-auth}}

      Config audit:
      {{audit-config}}

      Produce a security report:
      ## Critical (fix immediately)
      ## High (fix before merge)
      ## Medium (fix soon)
      ## Low (track)
      ## Overall risk assessment
