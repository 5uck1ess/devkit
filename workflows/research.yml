name: Research
description: Research workflow — clarify, decompose, parallel search, summarize, corroborate, synthesize

budget:
  limit: 200000
  downgrade: fast

steps:
  - id: clarify
    model: smart
    enforce: soft  # uses AskUserQuestion
    prompt: |
      The user wants to research: {{input}}

      Use ask_user to clarify before searching:
      - What specifically are we trying to learn?
      - What constraints matter (language, framework, scale)?
      - Any sources they already know about?

      After getting their answer, restate the research question precisely.

  - id: decompose
    model: general
    prompt: |
      Research question: {{clarify}}

      Break this into 3-5 sub-questions, each with an explicit retrieval goal.

      Format each as:
      - Query: <search query>
        Goal: <what this search should find>

      Rules:
      - Each query targets a DIFFERENT angle (definition, evidence, criticism, alternatives, recency)
      - No two queries should return the same results
      - Include at least one query seeking disconfirming evidence or criticism

  - id: search-1
    model: general
    enforce: soft  # WebSearch
    prompt: |
      Execute web search for the FIRST sub-question from this decomposition:
      {{decompose}}

      Collect titles, URLs, and key snippets.

  - id: search-2
    model: general
    enforce: soft  # WebSearch
    prompt: |
      Execute web search for the SECOND sub-question from this decomposition:
      {{decompose}}

      Collect titles, URLs, and key snippets.

  - id: search-3
    model: fast
    enforce: soft  # WebSearch
    prompt: |
      Execute web search for the THIRD sub-question from this decomposition:
      {{decompose}}

      Collect titles, URLs, and key snippets.

  - id: dispatch-searches
    parallel: [search-1, search-2, search-3]

  - id: summarize
    model: smart
    enforce: soft  # WebFetch via Jina Reader
    prompt: |
      Research question: {{clarify}}

      Search results:
      {{search-1}}
      {{search-2}}
      {{search-3}}

      For the 3-5 most promising URLs, fetch clean content:
        WebFetch https://r.jina.ai/{url} with header Accept: text/markdown

      CRITICAL: Immediately summarize each page into 3-5 key CLAIMS with source attribution.
      Do NOT carry raw page content forward.

      For each claim, note if it appears in multiple sources.
      Mark claims as:
      - CONFIRMED (2+ independent sources)
      - UNCORROBORATED (1 source only)
      - CONTESTED (sources disagree)

  - id: follow-up
    model: general
    enforce: soft  # WebSearch + WebFetch
    prompt: |
      Research question: {{clarify}}

      Current claims and corroboration status:
      {{summarize}}

      Review claims marked UNCORROBORATED or CONTESTED.
      For each, run one targeted search to confirm or resolve.
      Summarize new sources immediately.

      If all key claims are resolved, say "RESEARCH_COMPLETE".
    loop:
      max: 2
      until: RESEARCH_COMPLETE

  - id: synthesize
    model: smart
    prompt: |
      Research question: {{clarify}}

      Full analysis with corroboration:
      {{follow-up}}

      Write a clear synthesis:
      1. **Direct answer** to the research question
      2. **Key findings** with source URLs and corroboration status (CONFIRMED/UNCORROBORATED/CONTESTED)
      3. **Tradeoffs** between approaches
      4. **Open questions** — any CONTESTED claims without resolution
      5. **Recommendation** with confidence level (HIGH/MEDIUM/LOW)
